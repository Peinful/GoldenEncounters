<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Encounters | PokeMMO Team</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --accent-color: #e0c97b;
            --bg-dark: #050d11; 
        }

        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif;
        }

        .accent-glow {
            text-shadow: 0 0 25px rgba(224, 201, 123, 0.5);
        }

        /* Hero background styling */
        .hero-bg {
            background: linear-gradient(to bottom, rgba(5, 13, 17, 0.8), rgba(5, 13, 17, 1)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center 40%;
            position: relative;
            overflow: hidden;
        }

        /* Shiny Sparkle Animations */
        @keyframes sparkle-float {
            0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100px) scale(1.2) rotate(180deg); opacity: 0; }
        }

        .sparkle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            background: var(--accent-color);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0;
            animation: sparkle-float linear infinite;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: var(--bg-dark); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
        
        /* Interactive Feature Cards */
        .feature-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            z-index: 10;
        }
        
        .feature-card:hover {
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 30px rgba(224, 201, 123, 0.15);
            background: rgba(224, 201, 123, 0.03);
            transform: translateY(-5px);
        }

        /* Spotlight cards */
        .spotlight-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            z-index: 10;
        }
        .spotlight-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }
        .spotlight-card-accent {
            border: 1px solid rgba(224, 201, 123, 0.3);
            background: linear-gradient(to bottom right, rgba(224, 201, 123, 0.08), transparent);
        }
        .spotlight-header {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .sprite-glow {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
        }
        .sprite-glow-accent {
            filter: drop-shadow(0 0 25px rgba(224, 201, 123, 0.4));
        }

        /* Utility buttons */
        .btn-accent {
            background-color: var(--accent-color);
            color: #050d11;
            font-weight: 900;
            box-shadow: 0 10px 25px rgba(224, 201, 123, 0.15);
        }
        .btn-accent:hover {
            background-color: #f1dfa3;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(224, 201, 123, 0.25);
        }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 0 2px rgba(224, 201, 123, 0.15);
        }
    </style>
</head>
<body class="custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TEAM_NAME = "Golden Encounters";
        const DISCORD_LINK = "https://discord.gg/F934nRPG";
        const ACCENT_HEX = "#e0c97b";
        
        const POKEMON_DB = [
            { id: 1, name: "bulbasaur", location: "Kanto Route 1 (Lure)", method: "Sweet Scent" },
            { id: 4, name: "charmander", location: "Kanto Rock Tunnel", method: "Lure" },
            { id: 7, name: "squirtle", location: "Kanto Route 24", method: "Fishing" },
            { id: 25, name: "pikachu", location: "Viridian Forest", method: "Horde (5x)" },
            { id: 133, name: "eevee", location: "Kanto Route 17", method: "Rare Spawn" },
            { id: 147, name: "dratini", location: "Safari Zone", method: "Fishing / Pheno" },
            { id: 144, name: "articuno", location: "Seafoam Islands", method: "Legendary" },
            { id: 243, name: "raikou", location: "Roamer", method: "Legendary" },
        ];

        // Component to generate random sparkles
        const SparkleEffect = () => {
            const sparkles = useMemo(() => {
                return Array.from({ length: 40 }).map((_, i) => ({
                    id: i,
                    left: `${Math.random() * 100}%`,
                    top: `${Math.random() * 100}%`,
                    size: `${Math.random() * 6 + 2}px`,
                    delay: `${Math.random() * 5}s`,
                    duration: `${Math.random() * 3 + 2}s`,
                }));
            }, []);

            return (
                <div className="sparkle-container">
                    {sparkles.map(s => (
                        <div 
                            key={s.id}
                            className="sparkle"
                            style={{
                                left: s.left,
                                top: s.top,
                                width: s.size,
                                height: s.size,
                                animationDelay: s.delay,
                                animationDuration: s.duration
                            }}
                        />
                    ))}
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => { 
                if (window.lucide) lucide.createIcons(); 
            }, [currentPage, searchTerm]);

            const dailyHunt = useMemo(() => {
                const today = new Date().toDateString();
                let hash = 0;
                for (let i = 0; i < today.length; i++) hash = today.charCodeAt(i) + ((hash << 5) - hash);
                const index = Math.abs(hash) % POKEMON_DB.length;
                return POKEMON_DB[index];
            }, []);

            const navigateToHuntInfo = () => {
                setSearchTerm(dailyHunt.name);
                setCurrentPage('pokedex');
            };

            const NavItem = ({ id, icon, label }) => (
                <button 
                    onClick={() => { setCurrentPage(id); setSearchTerm(''); }}
                    className={`flex items-center gap-2 px-4 py-2 rounded-xl transition-all ${currentPage === id ? 'text-[#e0c97b] bg-[#e0c97b]/10' : 'text-zinc-500 hover:text-white'}`}
                >
                    <i data-lucide={icon} className="w-5 h-5"></i>
                    <span className="font-bold text-xs tracking-widest uppercase">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation */}
                    <nav className="border-b border-white/5 bg-[#050d11]/95 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3 group cursor-pointer" onClick={() => setCurrentPage('home')}>
                                <div className="bg-[#e0c97b] p-2 rounded-lg text-[#050d11] shadow-lg shadow-[#e0c97b]/20">
                                    <i data-lucide="trophy" className="w-5 h-5"></i>
                                </div>
                                <span className="text-xl font-black tracking-tighter text-white uppercase italic">Golden Encounters</span>
                            </div>
                            <div className="hidden lg:flex items-center gap-1">
                                <NavItem id="home" icon="home" label="Home" />
                                <NavItem id="team" icon="users" label="Team" />
                                <NavItem id="pokedex" icon="book-open" label="Pokedex" />
                                <NavItem id="events" icon="calendar" label="Events" />
                                <NavItem id="community" icon="message-square" label="Community" />
                                <a href={DISCORD_LINK} target="_blank" className="bg-[#5865F2] hover:bg-[#4752C4] px-5 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ml-4 text-xs tracking-widest uppercase">
                                    <i data-lucide="external-link" className="w-4 h-4"></i> Discord
                                </a>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow">
                        {currentPage === 'home' && (
                            <div className="animate-in fade-in duration-700">
                                {/* HERO SECTION */}
                                <section className="hero-bg pt-32 pb-24 px-6 border-b border-white/5">
                                    <SparkleEffect />
                                    <div className="max-w-7xl mx-auto text-center relative z-10">
                                        <h1 className="text-5xl md:text-7xl font-black mb-4 tracking-tight uppercase text-white leading-tight">
                                            WELCOME TO <span className="text-[#e0c97b]">GOLDEN ENCOUNTERS!</span>
                                        </h1>
                                        <p className="text-[#e0c97b] italic font-medium text-lg mb-8 tracking-wide accent-glow">
                                            Where Every Shiny Tells a Story
                                        </p>
                                        <p className="text-zinc-400 max-w-4xl mx-auto leading-relaxed text-sm md:text-base opacity-80 mb-16 px-4">
                                            Welcome to <span className="text-[#e0c97b] font-bold">Golden Encounters</span>, a dedicated PokeMMO shiny hunting team built on patience, passion, and that unbeatable thrill when the sparkle finally hits.
                                        </p>

                                        {/* Feature Grid with Hover Animations */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 px-4">
                                            <div className="feature-card p-10 rounded-2xl flex flex-col items-center">
                                                <i data-lucide="wand-2" className="text-[#e0c97b] w-8 h-8 mb-6"></i>
                                                <h3 className="font-black text-sm uppercase tracking-widest mb-3">Serious Shiny Hunting</h3>
                                                <p className="text-zinc-600 text-[11px] leading-relaxed uppercase tracking-tighter">Advanced strategies and dedicated hunting groups.</p>
                                            </div>
                                            <div className="feature-card p-10 rounded-2xl flex flex-col items-center">
                                                <i data-lucide="heart" className="text-[#e0c97b] w-8 h-8 mb-6 fill-[#e0c97b]/20"></i>
                                                <h3 className="font-black text-sm uppercase tracking-widest mb-3">Supportive Community</h3>
                                                <p className="text-zinc-600 text-[11px] leading-relaxed uppercase tracking-tighter">A friendly environment for veterans and beginners alike.</p>
                                            </div>
                                            <div className="feature-card p-10 rounded-2xl flex flex-col items-center">
                                                <i data-lucide="trending-up" className="text-[#e0c97b] w-8 h-8 mb-6"></i>
                                                <h3 className="font-black text-sm uppercase tracking-widest mb-3">Progress & Goals</h3>
                                                <p className="text-zinc-600 text-[11px] leading-relaxed uppercase tracking-tighter">Track your hunts and reach new milestones together.</p>
                                            </div>
                                            <div className="feature-card p-10 rounded-2xl flex flex-col items-center">
                                                <i data-lucide="trophy" className="text-[#e0c97b] w-8 h-8 mb-6"></i>
                                                <h3 className="font-black text-sm uppercase tracking-widest mb-3">Events & Challenges</h3>
                                                <p className="text-zinc-600 text-[11px] leading-relaxed uppercase tracking-tighter">Weekly competitions and rare prize distributions.</p>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* CURRENT SPOTLIGHTS SECTION */}
                                <section className="py-24 px-6 bg-[#050d11] relative overflow-hidden">
                                    <SparkleEffect />
                                    <div className="max-w-7xl mx-auto relative z-10">
                                        <div className="text-center mb-16">
                                            <h2 className="text-4xl font-black uppercase italic tracking-tighter">
                                                CURRENT <span className="text-[#e0c97b]">SPOTLIGHTS</span>
                                            </h2>
                                        </div>

                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                            {/* Frozen Spotlight */}
                                            <div className="spotlight-card flex flex-col">
                                                <div className="spotlight-header bg-gradient-to-b from-blue-900/10 to-transparent">
                                                    <span className="absolute top-6 left-6 bg-blue-600/10 border border-blue-500/20 text-blue-400 text-[9px] font-black px-3 py-1 rounded uppercase tracking-widest">Monthly Legendary</span>
                                                    <img src="https://play.pokemonshowdown.com/sprites/gen5ani-shiny/articuno.gif" className="h-28 sprite-glow" />
                                                </div>
                                                <div className="p-10 pt-4 flex-grow">
                                                    <h3 className="text-2xl font-black mb-1">Frozen Spotlight</h3>
                                                    <p className="text-blue-400 text-xs font-bold mb-6 uppercase tracking-widest">Shiny Articuno</p>
                                                    <p className="text-zinc-500 text-sm leading-relaxed opacity-70">A rare and majestic ice-type that embodies patience and precision.</p>
                                                </div>
                                            </div>

                                            {/* Accent Spotlight */}
                                            <div className="spotlight-card spotlight-card-accent flex flex-col">
                                                <div className="spotlight-header bg-gradient-to-b from-[#e0c97b]/10 to-transparent">
                                                    <span className="absolute top-6 left-6 bg-[#e0c97b]/10 border border-[#e0c97b]/30 text-[#e0c97b] text-[9px] font-black px-3 py-1 rounded uppercase tracking-widest">Featured Shiny</span>
                                                    <img src="https://play.pokemonshowdown.com/sprites/gen5ani-shiny/pikachu.gif" className="h-28 sprite-glow-accent" />
                                                </div>
                                                <div className="p-10 pt-4 flex-grow">
                                                    <h3 className="text-2xl font-black mb-1">Team Spotlight</h3>
                                                    <p className="text-[#e0c97b] text-xs font-bold mb-6 uppercase tracking-widest">Shiny Pikachu</p>
                                                    <p className="text-zinc-500 text-sm leading-relaxed opacity-70">This week's featured hunt is an iconic favorite. A classic that never fades.</p>
                                                </div>
                                            </div>

                                            {/* Storm Spotlight */}
                                            <div className="spotlight-card flex flex-col">
                                                <div className="spotlight-header bg-gradient-to-b from-purple-900/10 to-transparent">
                                                    <span className="absolute top-6 left-6 bg-purple-600/10 border border-purple-500/20 text-purple-400 text-[9px] font-black px-3 py-1 rounded uppercase tracking-widest">Monthly Legendary</span>
                                                    <img src="https://play.pokemonshowdown.com/sprites/gen5ani-shiny/raikou.gif" className="h-28 sprite-glow" />
                                                </div>
                                                <div className="p-10 pt-4 flex-grow">
                                                    <h3 className="text-2xl font-black mb-1">Storm Spotlight</h3>
                                                    <p className="text-purple-400 text-xs font-bold mb-6 uppercase tracking-widest">Shiny Raikou</p>
                                                    <p className="text-zinc-500 text-sm leading-relaxed opacity-70">A fierce roaming icon charged with raw energy. Fast, powerful, and unforgettable.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* MIDDLE CONTENT */}
                                <div className="max-w-7xl mx-auto px-6 py-20 w-full">
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                                        <div className="lg:col-span-2 space-y-12">
                                            {/* Daily Random Hunt */}
                                            <div className="bg-white/[0.02] border border-white/5 p-10 rounded-[2rem] overflow-hidden">
                                                <h2 className="text-2xl font-black mb-10 flex items-center gap-3 text-[#e0c97b] uppercase tracking-tighter italic">
                                                    <i data-lucide="sparkles" className="w-6 h-6"></i> Daily Random Hunt
                                                </h2>
                                                <div className="flex flex-col md:flex-row items-center gap-12 bg-black/40 p-10 rounded-3xl border border-white/5">
                                                    <div className="relative">
                                                        <div className="absolute inset-0 bg-[#e0c97b]/05 blur-[80px] rounded-full"></div>
                                                        <img src={`https://play.pokemonshowdown.com/sprites/gen5ani-shiny/${dailyHunt.name}.gif`} className="h-36 relative z-10" />
                                                    </div>
                                                    <div className="text-center md:text-left flex-1">
                                                        <h3 className="text-4xl font-black capitalize text-white mb-3 italic tracking-tighter">{dailyHunt.name}</h3>
                                                        <div className="flex flex-wrap items-center justify-center md:justify-start gap-4 mb-8">
                                                            <span className="flex items-center gap-2 text-zinc-500 font-bold uppercase text-[10px] tracking-widest">
                                                                <i data-lucide="map-pin" className="w-3.5 h-3.5 text-[#e0c97b]"></i> {dailyHunt.location}
                                                            </span>
                                                            <span className="bg-[#e0c97b]/10 text-[#e0c97b] text-[9px] px-3 py-1 rounded-full font-black uppercase tracking-widest border border-[#e0c97b]/20">
                                                                {dailyHunt.method}
                                                            </span>
                                                        </div>
                                                        <button 
                                                            onClick={navigateToHuntInfo}
                                                            className="btn-accent px-10 py-3.5 rounded-xl font-black transition-all flex items-center gap-2 mx-auto md:mx-0 uppercase text-[10px] tracking-[0.2em]"
                                                        >
                                                            More Info <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Featured Video */}
                                            <div className="bg-white/[0.02] border border-white/5 p-10 rounded-[2rem]">
                                                <h2 className="text-2xl font-black mb-8 flex items-center gap-3 text-red-500 uppercase tracking-tighter italic">
                                                    <i data-lucide="youtube" className="w-6 h-6"></i> Featured Video
                                                </h2>
                                                <div className="aspect-video bg-black rounded-3xl flex items-center justify-center border border-white/5 group relative cursor-pointer overflow-hidden shadow-2xl">
                                                    <div className="text-center group-hover:scale-105 transition-transform duration-500">
                                                        <div className="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center mx-auto shadow-2xl shadow-red-600/20">
                                                            <i data-lucide="play" className="w-10 h-10 text-white fill-current ml-1"></i>
                                                        </div>
                                                        <p className="mt-8 text-zinc-600 font-black uppercase tracking-[0.3em] text-[10px]">Latest Team Showcase</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Application Sidebar */}
                                        <div className="space-y-8">
                                            <div className="bg-[#0a151b]/40 border border-white/5 p-10 rounded-[2.5rem] sticky top-28 shadow-2xl backdrop-blur-md">
                                                <div className="mb-10">
                                                    <h3 className="text-3xl font-black uppercase italic tracking-tighter">Apply Now</h3>
                                                    <p className="text-zinc-600 text-[10px] mt-1 font-black uppercase tracking-[0.3em]">Join the Legacy</p>
                                                </div>
                                                <div className="space-y-5">
                                                    <div className="space-y-2">
                                                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1 block">In-game Name</label>
                                                        <input type="text" className="w-full p-4 rounded-xl outline-none text-sm text-white" placeholder="e.g. Red" />
                                                    </div>
                                                    <div className="space-y-2">
                                                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1 block">Discord</label>
                                                        <input type="text" className="w-full p-4 rounded-xl outline-none text-sm text-white" placeholder="User#0000" />
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="space-y-2">
                                                            <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1 block">Region</label>
                                                            <select className="w-full p-4 rounded-xl outline-none text-xs text-white appearance-none cursor-pointer">
                                                                <option>Kanto</option><option>Johto</option><option>Hoenn</option><option>Sinnoh</option><option>Unova</option>
                                                            </select>
                                                        </div>
                                                        <div className="space-y-2">
                                                            <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1 block">Exp.</label>
                                                            <select className="w-full p-4 rounded-xl outline-none text-xs text-white appearance-none cursor-pointer">
                                                                <option>Beginner</option><option>Intermediate</option><option>Experienced</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div className="space-y-2">
                                                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1 block">Motivation</label>
                                                        <textarea className="w-full p-4 rounded-xl h-28 outline-none text-sm text-white resize-none" placeholder="Tell us why..."></textarea>
                                                    </div>
                                                    <button onClick={() => alert('Application Sent!')} className="w-full btn-accent font-black py-5 rounded-xl transition-all uppercase tracking-[0.2em] text-[11px] mt-4">Send Application</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === 'pokedex' && (
                            <div className="animate-in fade-in duration-500 max-w-7xl mx-auto px-6 py-20">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-6">
                                    <div>
                                        <h1 className="text-5xl font-black italic tracking-tighter uppercase">Encyclopedia</h1>
                                        <p className="text-zinc-600 mt-2 font-medium uppercase text-[10px] tracking-widest opacity-80">PokeMMO Location Database</p>
                                    </div>
                                    <div className="relative w-full md:w-[400px]">
                                        <i data-lucide="search" className="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-700 w-5 h-5"></i>
                                        <input 
                                            type="text" 
                                            value={searchTerm}
                                            placeholder="Search by name..." 
                                            className="w-full bg-white/[0.01] border border-white/5 py-4 pl-14 pr-6 rounded-2xl outline-none focus:border-[#e0c97b] text-sm text-white"
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                                    {POKEMON_DB.filter(p => p.name.includes(searchTerm.toLowerCase())).map(poke => (
                                        <div key={poke.id} className="bg-white/[0.01] border border-white/5 p-8 rounded-[2rem] text-center group hover:bg-[#e0c97b]/05 transition-all hover:-translate-y-2 hover:border-[#e0c97b]/30">
                                            <div className="bg-black/40 rounded-2xl mb-6 p-4 aspect-square flex items-center justify-center relative overflow-hidden">
                                                <img src={`https://play.pokemonshowdown.com/sprites/gen5ani-shiny/${poke.name}.gif`} className="max-h-24 group-hover:scale-125 transition-transform relative z-10" />
                                            </div>
                                            <h3 className="font-black capitalize mb-1 text-base tracking-tight">{poke.name}</h3>
                                            <p className="text-[10px] text-[#e0c97b] font-black tracking-widest uppercase mb-4">{poke.method}</p>
                                            <p className="text-[10px] text-zinc-600 leading-tight font-bold opacity-70 uppercase">{poke.location}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Restricted States */}
                        {(currentPage === 'team' || currentPage === 'events' || currentPage === 'community') && (
                            <div className="flex flex-col items-center justify-center py-40 max-w-7xl mx-auto px-6">
                                <div className="bg-white/[0.01] p-12 rounded-full mb-10 border border-white/5">
                                    <i data-lucide="lock" className="w-16 h-16 text-[#e0c97b]/20"></i>
                                </div>
                                <h2 className="text-4xl font-black mb-4 tracking-tighter uppercase italic">Access Restricted</h2>
                                <p className="text-zinc-600 mb-12 max-w-sm text-center font-bold uppercase text-[10px] tracking-widest leading-loose opacity-80">Authorized Team Members Only. Please authenticate via Discord.</p>
                                <button className="btn-accent px-12 py-5 rounded-2xl font-black transition-all uppercase tracking-[0.3em] text-[10px] flex items-center gap-4">
                                    Authenticate <i data-lucide="shield-check" className="w-4 h-4"></i>
                                </button>
                            </div>
                        )}
                    </main>

                    {/* MINIMALIST FOOTER */}
                    <footer className="border-t border-white/5 py-12 bg-[#050d11]">
                        <div className="max-w-7xl mx-auto px-6 flex flex-col items-center">
                            <p className="text-zinc-700 font-black tracking-[0.4em] uppercase text-[9px] flex items-center gap-2">
                                Made with <i data-lucide="heart" className="w-3.5 h-3.5 text-zinc-800 fill-current"></i> by <span className="text-zinc-500">Pein</span>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
