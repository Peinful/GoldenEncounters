<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Encounters | Team Roster</title>
    <!-- Dependencies for React to run in a plain HTML file -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --bg-deep: #050a14;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body { background-color: var(--bg-deep); color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .heading-font { font-family: 'Outfit', sans-serif; }
        
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Navigation styling matching index.html */
        .nav-link {
            position: relative;
            transition: all 0.3s ease;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #94a3b8;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--gold);
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }

        .gold-text {
            background: linear-gradient(45deg, #facc15, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .pixelated { image-rendering: pixelated; }

        .btn-discord {
            background: #5865F2;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
            transition: all 0.3s ease;
        }
        .btn-discord:hover {
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const Icon = ({ name, size = 18, className = "" }) => <i className={`fas fa-${name} ${className}`} style={{ fontSize: size }}></i>;

        function App() {
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [members, setMembers] = useState([
                {
                    id: '1',
                    name: 'Example Member',
                    rank: 'Leader',
                    shinies: [
                        { nickname: 'Pikachu', pokedexId: '25', date: '2023-10-01', encounters: 5000, isFeatured: true, ivs: { hp: 31, atk: 10, def: 15, spa: 31, spd: 20, spe: 31 } }
                    ]
                }
            ]);

            return (
                <div className="min-h-screen relative overflow-x-hidden">
                    {/* Background */}
                    <div className="fixed inset-0 z-0">
                        <div className="absolute inset-0 bg-gradient-to-b from-[#050a14]/70 to-[#050a14] z-10"></div>
                        <img 
                            src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070" 
                            className="w-full h-full object-cover opacity-30 saturate-50 contrast-125"
                            alt="hero-bg"
                        />
                    </div>

                    {/* Navigation Bar - Matching index.html */}
                    <nav className="fixed top-0 left-0 w-full z-50 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between glass-card px-8 py-4 rounded-2xl">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(250,204,21,0.5)]">
                                    <Icon name="star" className="text-slate-900" />
                                </div>
                                <span className="heading-font font-black text-xl tracking-tight hidden md:block uppercase">
                                    GOLDEN <span className="gold-text">ENCOUNTERS</span>
                                </span>
                            </div>
                            
                            <div className="hidden lg:flex items-center gap-10">
                                <a href="index.html" className="nav-link">Home</a>
                                <a href="team.html" className="nav-link active">Team</a>
                                <a href="pokedex.html" className="nav-link">Pokedex</a>
                                <a href="events.html" className="nav-link">Events</a>
                                <a href="community.html" className="nav-link">Community</a>
                            </div>

                            <div className="flex items-center gap-4">
                                <a href="https://discord.gg/yourlink" target="_blank" className="btn-discord px-6 py-2.5 rounded-xl text-xs font-black text-white uppercase tracking-widest flex items-center gap-2">
                                    <i className="fab fa-discord text-sm"></i>
                                    <span>Discord</span>
                                </a>
                            </div>
                        </div>
                    </nav>

                    <main className="relative z-10 max-w-6xl mx-auto px-4 pt-32 pb-32">
                        <div className="flex justify-end mb-12">
                            <button 
                                onClick={() => setIsAdminMode(!isAdminMode)}
                                className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-[10px] font-black tracking-widest uppercase border transition-all ${
                                    isAdminMode 
                                    ? 'bg-yellow-500 text-slate-900 border-yellow-500 shadow-lg shadow-yellow-500/20' 
                                    : 'bg-white/5 text-slate-400 border-white/10 hover:bg-white/10'
                                }`}
                            >
                                <Icon name="shield-alt" size={14} />
                                {isAdminMode ? 'Admin Mode: On' : 'Admin Login'}
                            </button>
                        </div>

                        <div className="grid grid-cols-1 gap-10">
                            {members.map((member) => (
                                <div key={member.id} className="glass-card p-8 md:p-12 rounded-[2.5rem] bg-slate-900/40 hover:bg-slate-900/60 transition-all border-white/5">
                                    <div className="flex flex-col md:flex-row items-center md:items-start gap-10">
                                        <div className="relative">
                                            <div className="w-32 h-32 rounded-3xl bg-slate-800/50 border border-white/5 flex items-center justify-center p-4">
                                                <img 
                                                    src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/shiny/${member.shinies[0]?.pokedexId || 25}.gif`} 
                                                    className="w-full h-full object-contain pixelated drop-shadow-[0_0_15px_rgba(255,215,0,0.3)]"
                                                />
                                            </div>
                                            <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 px-5 py-1.5 bg-yellow-500 text-slate-900 rounded-full text-[9px] font-black uppercase tracking-widest">
                                                {member.rank}
                                            </div>
                                        </div>
                                        <div className="text-center md:text-left">
                                            <h3 className="heading-font text-5xl font-black text-white uppercase tracking-tighter mb-2">{member.name}</h3>
                                            <div className="flex items-center justify-center md:justify-start gap-2 text-slate-400 text-xs font-bold uppercase tracking-widest">
                                                <Icon name="bolt" className="text-yellow-500" />
                                                <span>{member.shinies.length} Registered Captures</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-14 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {member.shinies.map((shiny, idx) => (
                                            <div key={idx} className="bg-black/30 border border-white/5 p-6 rounded-3xl flex flex-col hover:border-yellow-500/30 transition-all">
                                                <div className="flex items-center gap-4 mb-6">
                                                    <img 
                                                        src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/shiny/${shiny.pokedexId}.gif`} 
                                                        className="w-12 h-12 pixelated"
                                                    />
                                                    <div>
                                                        <h4 className="heading-font font-bold text-yellow-500 text-xl uppercase">{shiny.nickname}</h4>
                                                        <p className="text-[9px] text-slate-500 font-black uppercase">{shiny.date}</p>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-3 gap-1.5 text-[9px] font-black mb-6">
                                                    {Object.entries(shiny.ivs).map(([stat, val]) => (
                                                        <div key={stat} className="bg-black/30 rounded-lg px-2 py-2 flex justify-between border border-white/5">
                                                            <span className="text-slate-600 uppercase">{stat}</span>
                                                            <span className={val === 31 ? "text-yellow-400" : "text-white"}>{val}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="mt-auto flex justify-between items-center bg-black/40 px-4 py-3 rounded-2xl border border-white/5">
                                                    <span className="text-[10px] font-black text-white uppercase">{shiny.encounters.toLocaleString()} ENCNTRS</span>
                                                    <span className="text-[9px] font-black text-yellow-500 uppercase tracking-widest">Verified</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="py-24 text-center opacity-30 border-t border-white/5 bg-black/20">
                        <p className="text-[10px] uppercase tracking-[0.5em] font-black mb-2">Golden Encounters Syndicate</p>
                        <p className="text-[8px] font-bold uppercase tracking-widest text-slate-500">A PokeMMO Shiny Hunting Collective</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
